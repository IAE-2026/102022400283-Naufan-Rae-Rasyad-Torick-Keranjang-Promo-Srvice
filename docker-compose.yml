services:
  app:
    build: .
    expose:
      - "8000"
    ports:
      - "${APP_PORT:-8000}:8000"
    working_dir: /app
    command: php artisan serve --host=0.0.0.0 --port=8000
    depends_on:
      - mysql

  # === MySQL Database ===
  mysql:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_DATABASE: cart_promo_service_db
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"